<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efeito Smoky</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111; /* Fundo escuro para destacar a fumaça */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .smoky-text {
            color: white;
            font-size: 8rem;
            font-weight: bold;
            letter-spacing: 10px;
            cursor: default;
            transition: 1.5s ease-out; /* Transição suave de volta */
        }

        /* O truque acontece aqui no hover */
        .smoky-text:hover {
            /* Move para cima e para a direita (diagonal) */
            transform: translate(50px, -100px) skewX(20deg);
            
            /* Torna o texto transparente */
            color: transparent;
            
            /* Cria o efeito de fumaça usando múltiplos text-shadows */
            text-shadow: 
                0 0 40px rgba(255, 255, 255, 0.8),
                10px -10px 60px rgba(255, 255, 255, 0.5),
                -10px -20px 80px rgba(255, 255, 255, 0.2);
            
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="smoky-text">SMOKY</div>

</body>
</html>
