<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efeito Smoky Letra por Letra</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        .container {
            display: flex;
        }

        .container span {
            color: #fff;
            font-size: 6rem;
            font-weight: bold;
            display: inline-block;
            transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }

        /* Efeito ao passar o mouse no CONTAINER (afeta as letras) */
        .container:hover span {
            transform: translate(60px, -150px) rotate(30deg) scale(1.5);
            color: transparent;
            text-shadow: 0 0 50px #fff;
            opacity: 0;
            filter: blur(20px);
        }

        /* Atrasos individuais para criar a sequência de fumaça */
        .container span:nth-child(1) { transition-delay: 0s; }
        .container span:nth-child(2) { transition-delay: 0.1s; }
        .container span:nth-child(3) { transition-delay: 0.2s; }
        .container span:nth-child(4) { transition-delay: 0.3s; }
        .container span:nth-child(5) { transition-delay: 0.4s; }

    </style>
</head>
<body>

    <div class="container">
        <span>S</span>
        <span>M</span>
        <span>O</span>
        <span>K</span>
        <span>Y</span>
    </div>

</body>
</html>
